unknown_symbol = "¾░éæ"

[[battery.display]]
style = "bold bg:color_purple fg:color_red"
threshold = 30

[[battery.display]]
style = "bg:color_purple fg:color_yellow"
threshold = 60

# --- Memory Usage (color_dark_gray) ---

[memory_usage]
disabled = false
format = '[ $symbol$ram_pct ]($style)'
style = "bg:color_dark_gray fg:color_cream"
