# ===========================================================
# Right Prompt Segments
# ===========================================================

# --- Jobs (floating, before right segments) ---

[jobs]
disabled = false
format = '[$symbol$number ]($style)'
number_threshold = 1
style = "bold fg:color_blue"
symbol = "Ō£”"

# --- Status (color_dark_gray) ---

[status]
disabled = false
format = '[$symbol$common_meaning$signal_name$maybe_int]($style) '
map_symbol = true
style = 'bg:color_dark_gray'
success_symbol = '[[Ō£ō](bold bg:color_dark_gray fg:color_green)]($style)'
symbol = '[[Ō£¢](bold bg:color_dark_gray fg:color_red)]($style)'

# --- Command Duration (color_light_gray) ---

[cmd_duration]
format = "[ $duration ]($style)"
min_time = 500
style = "bg:color_light_gray fg:color_terminal_background"

# --- Battery (color_purple) ---

[battery]
charging_symbol = "¾░éä"
discharging_symbol = "¾░éā"
empty_symbol = "¾░éÄ"
format = '[[$symbol]($style) $percentage](bold bg:color_purple fg:color_terminal_background)'
